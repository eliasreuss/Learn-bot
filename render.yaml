services:
  - type: web
    name: inact-chatbot
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && cd ui && npm install && npm run build
    startCommand: uvicorn chatbot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
